# ============================================================
# Configuración nginx para servir el frontend estático del
# Inventario ITU dentro de Kubernetes.
#
# Sirve los archivos estáticos (index.html, listado.html,
# formulario.html, detalle.html, css/, js/, img/) y expone un
# proxy interno hacia el backend en /api/, para que el frontend
# pueda hablarle a la API sin depender de una IP/puerto público.
#
# NOTA IMPORTANTE (mismatch conocido, ver docs/runbook-despliegue.md):
# `js/api.js` define hoy `API_URL = "http://localhost:8000"` a fuego.
# Eso funciona para desarrollo local, pero DENTRO de Kubernetes el
# navegador del usuario no puede resolver "backend-service".
# Hay dos formas de resolverlo (documentadas en el runbook):
#
#   Opción A (recomendada): cambiar en el repo del frontend
#     `const API_URL = "/api";`
#   y dejar que este proxy reenvíe /api/* -> backend-service:8000/*.
#
#   Opción B: exponer el backend con un Service NodePort/Ingress propio
#   y compilar el frontend con esa URL pública en `API_URL`.
#
# Mientras el equipo de frontend no aplique la Opción A, el bloque
# `location /api/` de abajo queda definido pero sin uso real.
# ============================================================

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Páginas estáticas (multi-page, no es una SPA con router propio).
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy hacia el backend FastAPI dentro del clúster.
    # Quita el prefijo /api antes de reenviar (p. ej. /api/auth/login -> /auth/login).
    location /api/ {
        proxy_pass         http://backend-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Endpoint de salud para el readiness/liveness probe del Deployment.
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
