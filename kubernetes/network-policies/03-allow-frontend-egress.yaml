# ============================================================
# 03 - Allow Frontend Egress
#
# El frontend (nginx) solo necesita salir hacia el backend, para el
# proxy /api/ definido en docker/frontend/nginx.conf
# (proxy_pass http://backend-service:8000/). No tiene motivo para
# hablar con Mongo, SQL Server ni LDAP directamente.
#
# (La resolución DNS ya está cubierta por 01-allow-dns.yaml)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
  namespace: inventario
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 8000
